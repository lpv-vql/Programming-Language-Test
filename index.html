<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>プログラミング言語置き場</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sono:MONO@1&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 40px;
      background-color: #fff;
    }
    textarea {
      font-family: "Sono", monospace;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
      font-variation-settings: "MONO" 1;
      font-size: 20px;
      width: 100%;
      min-height: 100vh; 
      field-sizing: content;
      overflow-y: hidden;
      border: none;
      resize: none;
    }
    textarea:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <textarea class="code" spellcheck="false"></textarea>
</body>
</html>
