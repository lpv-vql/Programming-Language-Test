<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Page Title</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background-color: #fff;
    }
    textarea {
      font-family: sans-serif;
      font-size: 20px;
      width: 100%;
      min-height: 100vh; 
      overflow-y: hidden;
      border: none;
      resize: none;
    }
    textarea:focus {
      outline: none;
      border-color: #4a90e2;
      background-color: #fff;
    }
  </style>
</head>
<body>
  <textarea class="code"></textarea>

  <script>
    const tx = document.querySelector('.code');
    tx.addEventListener('input', function() {
      this.style.height = 'auto';
      if (this.scrollHeight > window.innerHeight) {
        this.style.height = this.scrollHeight + 'px';
      }
    });
  </script>
</body>
</html>
